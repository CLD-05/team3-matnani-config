apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: matnani-app-secret
  namespace: team3-matnani-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: team3-matnani-dev-secret-store
    kind: ClusterSecretStore
  target:
    name: matnani-app-secret
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: /team3/matnani/dev/db-url
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: /team3/matnani/dev/db-username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: /team3/matnani/dev/db-password
    - secretKey: JWT_SECRET
      remoteRef:
        key: /team3/matnani/dev/jwt-secret
    - secretKey: SPRING_DATA_REDIS_HOST
      remoteRef:
        key: /team3/matnani/dev/redis-host
    - secretKey: BUSINESS_API_KEY
      remoteRef:
        key: /team3/matnani/dev/business-api-key
    - secretKey: CLOUD_AWS_S3_BUCKET
      remoteRef:
        key: /team3/matnani/dev/s3-bucket-name
