apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- external-secret.yaml

namespace: team3-matnani-dev

images:
- name: team3-matnani-api
  newName: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com/team3-matnani-dev-api
  newTag: de532d8

patches:
- path: ingress-patch.yaml
  target:
    kind: Ingress
    name: matnani-api
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: matnani-api
