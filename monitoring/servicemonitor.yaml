apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: matnani-api
  namespace: monitoring
  labels:
    release: team3-matnani-kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - team3-matnani-dev
  selector:
    matchLabels:
      app: matnani-api
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
